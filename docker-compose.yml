version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: thedugout-db
    environment:
      POSTGRES_DB: thedugout
      POSTGRES_USER: thedugout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-DugoutDev2024!}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thedugout"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
