services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: thedugout
      POSTGRES_USER: thedugout
      POSTGRES_PASSWORD: DugoutDev2024!
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thedugout -d thedugout"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: thedugout-viewer-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=thedugout;Username=thedugout;Password=DugoutDev2024!"
      UploadsPath: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "8083:8080"

  frontend:
    image: thedugout-viewer-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8082:80"

volumes:
  pgdata:
  uploads:
